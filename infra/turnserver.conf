# Configuración de coturn para Remotix (TURN/STUN, NAT traversal de WebRTC).
#
# Las credenciales son EFÍMERAS: el servidor Node firma con HMAC-SHA1 usando el
# mismo `static-auth-secret` (debe coincidir con TURN_SECRET del server). Por eso
# no se definen usuarios fijos. El docker-compose pasa el secreto por flags de
# arranque; este archivo sirve como referencia para instalaciones sin Docker.

listening-port=3478
# tls-listening-port=5349           # descomenta si tienes certs para turns:

fingerprint
use-auth-secret
static-auth-secret=CAMBIA_ESTE_SECRETO   # == TURN_SECRET del servidor
realm=CAMBIA.TU.DOMINIO

# IP pública del servidor (necesaria si está detrás de NAT 1:1; en un VPS con
# IP pública directa coturn suele autodetectarla, pero es más fiable fijarla).
# external-ip=TU.IP.PUBLICA

# Rango de puertos para el relay de medios (abre estos en el firewall, UDP).
min-port=49160
max-port=49200

# Endurecimiento.
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
total-quota=200
stale-nonce=600

# Certificados para turns: (TLS). Puedes reutilizar los de Caddy:
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem

log-file=stdout
verbose
